name: Deploy Dashboard to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/vercel-deploy.yml'
  pull_request:
    paths:
      - 'apps/dashboard/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        working-directory: apps/dashboard
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=drivippa-3432s-projects --yes --prod 2>&1 | tail -1)
          else
            URL=$(vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=drivippa-3432s-projects --yes 2>&1 | tail -1)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Dashboard preview ready: ${{ steps.deploy.outputs.url }}`
            })
